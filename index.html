<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>啦啦隊活動月曆</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <div class="eyebrow">CHEER SCHEDULE</div>
      <h1>啦啦隊活動月曆</h1>
    </div>
  </div>

  <div class="monthbar">
    <button class="navbtn" id="prev">‹</button>
    <div class="label" id="monthLabel"></div>
    <button class="navbtn" id="next">›</button>
  </div>

  <div class="weekdays">
    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
  </div>
  <div class="grid" id="grid"></div>

  <div class="legend" id="legend"></div>

  <div class="hint">
    要新增或修改活動：編輯 repo 裡的 <code>events.json</code>，commit 後 push，網站約一分鐘內自動更新。<br>
    要調整顏色或新增球隊：編輯 <code>styles.css</code> 最上方的色票區。
  </div>
</div>

<!-- 詳情票根 -->
<div class="overlay" id="overlay">
  <div class="ticket" id="ticket"></div>
</div>

<script src="app.js"></script>
</body>
</html>
